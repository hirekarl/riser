# Render Blueprint for Riser.
# Two services only, split so a change under one directory never triggers a
# deploy of the other, and a docs-only change (root markdown / docs/**)
# triggers neither.
#
# NOTE (verify at setup time): connecting this repo to Render and enabling
# "only deploy if checks pass" against GitHub CI is a manual step in the
# Render dashboard (Settings > Build & Deploy) — no Render API/MCP access
# was available to configure this programmatically. Also verify the exact
# current schema for `runtime`/`env` and `staticPublishPath` against
# Render's live docs before applying this blueprint; the platform's
# render.yaml schema has shifted across product iterations.

services:
  - type: web
    name: riser-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildFilter:
      paths:
        - backend/**
      ignoredPaths:
        - backend/**/*.md
    buildCommand: >-
      curl -LsSf https://astral.sh/uv/install.sh | sh &&
      uv sync --locked --no-dev &&
      uv run python manage.py collectstatic --noinput &&
      uv run python manage.py migrate
    startCommand: "uv run gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: riser-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://riser-frontend.onrender.com

  - type: web
    name: riser-frontend
    runtime: static
    rootDir: frontend
    buildFilter:
      paths:
        - frontend/**
      ignoredPaths:
        - frontend/**/*.md
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://riser-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: riser-db
    databaseName: riser
    user: riser
    plan: starter
