name: Release

# Deliberately does NOT push a version bump directly to main — that would
# conflict with main's branch protection (no direct pushes without going
# through a required review + required checks, except the narrow,
# review-only admin bypass). Instead, this opens a release PR that goes
# through the same gate as any other change.

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.10"

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check whether a version bump is due
        id: check
        run: |
          if uvx --from commitizen cz bump --dry-run --yes >/tmp/cz-dry-run.log 2>&1; then
            echo "bump_due=true" >> "$GITHUB_OUTPUT"
          else
            echo "bump_due=false" >> "$GITHUB_OUTPUT"
            cat /tmp/cz-dry-run.log
          fi

      - name: Bump version and update CHANGELOG
        if: steps.check.outputs.bump_due == 'true'
        run: uvx --from commitizen cz bump --changelog --yes

      - name: Regenerate backend lockfile after version bump
        if: steps.check.outputs.bump_due == 'true'
        working-directory: backend
        run: |
          uv lock
          if ! git diff --quiet -- uv.lock; then
            git add uv.lock
            git commit --amend --no-edit
          fi

      - name: Regenerate frontend lockfile after version bump
        if: steps.check.outputs.bump_due == 'true'
        working-directory: frontend
        run: |
          npm install --package-lock-only
          if ! git diff --quiet -- package-lock.json; then
            git add package-lock.json
            git commit --amend --no-edit
          fi

      - name: Open release PR
        if: steps.check.outputs.bump_due == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: release/next
          title: "chore(release): version bump"
          commit-message: "chore(release): version bump"
          body: >-
            Automated release PR generated by `cz bump --changelog`.
            Goes through the normal required-review + required-checks gate
            like any other change.
