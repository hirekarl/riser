name: Frontend CI

# See backend-ci.yml's header comment for why this doesn't filter at the
# workflow-trigger level — the `test` job always runs; only its steps are
# conditionally skipped, so the "frontend-ci / test" check is always
# reported and never stalls a PR that doesn't touch frontend/**.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'

  test:
    name: frontend-ci / test
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm ci

      - name: eslint
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run lint

      - name: tsc --noEmit
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run typecheck

      - name: vitest --coverage (>=90%)
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run test:coverage

      - name: build
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run build

      - name: install playwright browsers
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: playwright e2e
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run test:e2e
